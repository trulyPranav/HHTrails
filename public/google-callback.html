<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign In</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4285F4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #d32f2f;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p id="message">Completing sign in...</p>
    </div>

    <script>
        // Extract ID token from URL hash
        function getHashParams() {
            const hash = window.location.hash.substring(1);
            const params = {};
            hash.split('&').forEach(item => {
                const [key, value] = item.split('=');
                if (key && value) {
                    params[key] = decodeURIComponent(value);
                }
            });
            return params;
        }

        // Extract from query params
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            const result = {};
            for (const [key, value] of params.entries()) {
                result[key] = value;
            }
            return result;
        }

        try {
            // Try hash params first (implicit flow)
            let params = getHashParams();
            
            // If not in hash, try query params (authorization code flow)
            if (!params.id_token && !params.access_token) {
                params = getQueryParams();
            }

            const idToken = params.id_token || params.access_token;
            const error = params.error;
            const errorDescription = params.error_description;

            if (error) {
                document.getElementById('message').textContent = 'Sign in failed';
                document.getElementById('message').className = 'error';
                
                // Send error to parent
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'GOOGLE_AUTH_ERROR',
                        error: errorDescription || error
                    }, window.location.origin);
                }
                
                // Close popup after delay
                setTimeout(() => window.close(), 2000);
            } else if (idToken) {
                // Send token to parent window
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'GOOGLE_AUTH_SUCCESS',
                        idToken: idToken
                    }, window.location.origin);
                    
                    document.getElementById('message').textContent = 'Success! Closing window...';
                    setTimeout(() => window.close(), 1000);
                } else {
                    throw new Error('No parent window found');
                }
            } else {
                throw new Error('No authentication data received');
            }
        } catch (err) {
            console.error('Google Auth Callback Error:', err);
            document.getElementById('message').textContent = 'An error occurred';
            document.getElementById('message').className = 'error';
            
            if (window.opener) {
                window.opener.postMessage({
                    type: 'GOOGLE_AUTH_ERROR',
                    error: err.message
                }, window.location.origin);
            }
            
            setTimeout(() => window.close(), 2000);
        }
    </script>
</body>
</html>
